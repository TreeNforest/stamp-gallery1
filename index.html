const svgCircle=(t,s,c)=>`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><circle cx="70" cy="70" r="64" fill="#fff" stroke="${c}" stroke-width="3.5"/><circle cx="70" cy="70" r="56" fill="none" stroke="${c}" stroke-width="1.2" stroke-dasharray="4,3"/><circle cx="70" cy="70" r="20" fill="none" stroke="${c}" stroke-width="1.5"/><text x="70" y="62" text-anchor="middle" font-size="22" font-weight="700" fill="${c}" font-family="serif" letter-spacing="6">${t}</text><text x="70" y="82" text-anchor="middle" font-size="9" fill="${c}" font-family="serif" letter-spacing="4">${s}</text><defs><path id="a1c" d="M18,70 A52,52 0 1,1 122,70"/></defs><text font-size="8" fill="${c}" font-family="serif" letter-spacing="5"><textPath href="#a1c" startOffset="12%">印　信　之　章</textPath></text></svg>`;

const svgOval=(t,b,c)=>`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><ellipse cx="70" cy="70" rx="62" ry="50" fill="none" stroke="${c}" stroke-width="3.5"/><ellipse cx="70" cy="70" rx="55" ry="43" fill="none" stroke="${c}" stroke-width="1"/><line x1="15" y1="70" x2="125" y2="70" stroke="${c}" stroke-width="1" opacity=".3"/><text x="70" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="${c}" font-family="serif" letter-spacing="3">${t}</text><text x="70" y="88" text-anchor="middle" font-size="11" fill="${c}" font-family="serif" letter-spacing="4">${b}</text></svg>`;
const svgHanko=(ch,c)=>`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><circle cx="70" cy="70" r="58" fill="${c}"/><circle cx="70" cy="70" r="52" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/><text x="70" y="92" text-anchor="middle" font-size="66" font-weight="700" fill="white" font-family="serif">${ch}</text></svg>`;
const svgWax=(ini,c)=>{const pts=Array.from({length:14},(_,i)=>{const a=(i/14)*Math.PI*2,r=54+Math.sin(i*2.3)*7;return`${70+r*Math.cos(a)},${70+r*Math.sin(a)}`;}).join(' ');return`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><polygon points="${pts}" fill="${c}" opacity=".9"/><circle cx="70" cy="70" r="38" fill="${c}"/><circle cx="70" cy="70" r="33" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/><text x="70" y="80" text-anchor="middle" font-size="28" font-weight="700" fill="white" font-family="Georgia,serif" letter-spacing="2">${ini}</text></svg>`;};
const svgRect=(l1,l2,c)=>`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="28" width="124" height="84" rx="4" fill="none" stroke="${c}" stroke-width="3.5"/><rect x="14" y="34" width="112" height="72" rx="3" fill="none" stroke="${c}" stroke-width="1"/><line x1="8" y1="70" x2="132" y2="70" stroke="${c}" stroke-width="2"/><text x="70" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="${c}" font-family="serif" letter-spacing="3">${l1}</text><text x="70" y="92" text-anchor="middle" font-size="11" fill="${c}" font-family="serif" letter-spacing="4">${l2}</text></svg>`;
const svgFlower=(ch,c)=>{const p=Array.from({length:8},(_,i)=>`<ellipse cx="70" cy="28" rx="8" ry="14" fill="${c}" opacity=".25" transform="rotate(${(i/8)*360} 70 70)"/>`).join('');return`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${p}<circle cx="70" cy="70" r="36" fill="none" stroke="${c}" stroke-width="2"/><circle cx="70" cy="70" r="30" fill="none" stroke="${c}" stroke-width="1" stroke-dasharray="3,2"/><text x="70" y="85" text-anchor="middle" font-size="40" font-weight="700" fill="${c}" font-family="serif">${ch}</text></svg>`;};
const svgCune=(c)=>{const w=[[35,45,55,45],[55,45,75,45],[75,45,95,45],[35,60,45,55],[45,55,65,60],[65,60,85,55],[85,55,95,60],[35,75,55,70],[55,70,80,75],[80,75,95,70],[40,90,60,85],[60,85,85,90]];return`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><rect x="15" y="28" width="110" height="84" fill="none" stroke="${c}" stroke-width="2.5"/>${w.map(([x1,y1,x2,y2])=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="3.5" stroke-linecap="square"/>`).join('')}</svg>`;};
const svgChop=(c)=>`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="20" width="100" height="100" fill="none" stroke="${c}" stroke-width="3"/><rect x="28" y="28" width="84" height="84" fill="none" stroke="${c}" stroke-width="1" stroke-dasharray="5,3"/><text x="70" y="66" text-anchor="middle" font-size="16" font-weight="700" fill="${c}" font-family="serif" letter-spacing="1">HONG KONG</text><line x1="30" y1="74" x2="110" y2="74" stroke="${c}" stroke-width="1.5"/><text x="70" y="92" text-anchor="middle" font-size="12" fill="${c}" font-family="serif" letter-spacing="3">香　港</text><text x="70" y="108" text-anchor="middle" font-size="9" fill="${c}" font-family="serif" letter-spacing="2">CUSTOMS PASS</text></svg>`;
function renderSvg(key,args){switch(key){case"circle":return svgCircle(...args);case"square":return svgSquare(...args);case"oval":return svgOval(...args);case"hanko":return svgHanko(...args);case"wax":return svgWax(...args);case"rect":return svgRect(...args);case"flower":return svgFlower(...args);case"cune":return svgCune(...args);case"chop":return svgChop(...args);default:return svgSquare("?","#888");}}

function useToast(){const[msg,setMsg]=useState("");const[show,setShow]=useState(false);const t=useRef(null);const fire=m=>{setMsg(m);setShow(true);clearTimeout(t.current);t.current=setTimeout(()=>setShow(false),2500);};return{msg,show,fire};}
const inp={width:"100%",padding:"7px 11px",border:"1.5px solid #e8d5b0",background:"white",fontFamily:"serif",fontSize:13,color:"#1a0a00",borderRadius:2,outline:"none",letterSpacing:1,boxSizing:"border-box"};
const lbl={fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#b8860b",marginBottom:4,display:"block"};

const closeBtn={position:"absolute",top:10,right:14,background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#b8860b",lineHeight:1};

function StampVisual({stamp,size=120}){
  if(stamp.image)return(<div style={{width:size,height:size,borderRadius:3,overflow:"hidden",border:"1px solid #e8d5b0",flexShrink:0}}><img src={stamp.image} alt={stamp.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>);
  return <div style={{width:size,height:size,flexShrink:0}} dangerouslySetInnerHTML={{__html:renderSvg(stamp.svgKey,stamp.svgArgs)}}/>;
}

function ColorPicker({cat,onClose,onApply}){
  const[hex,setHex]=useState(cat.color.replace("#",""));
  const preview=isHex(hex)?"#"+hex:cat.color;
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.35)",backdropFilter:"blur(2px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fdf6e3",border:"1px solid #e8d5b0",borderRadius:4,padding:20,width:215,boxShadow:"0 8px 32px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:11,letterSpacing:3,color:"#b8860b",marginBottom:10,textTransform:"uppercase"}}>「{cat.name}」顏色</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{PALETTE.map(p=>(<div key={p} onClick={()=>setHex(p.replace("#",""))} style={{width:22,height:22,borderRadius:"50%",background:p,cursor:"pointer",border:p.toLowerCase()===("#"+hex).toLowerCase()?"2.5px solid #333":"2px solid transparent",boxSizing:"border-box"}}/>))}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:13,color:"#aaa",fontFamily:"monospace"}}>#</span>
          <input value={hex} onChange={e=>setHex(e.target.value.replace(/[^0-9a-fA-F]/g,"").slice(0,6))} placeholder="1a3a6a" style={{flex:1,padding:"5px 8px",border:"1.5px solid #e8d5b0",borderRadius:2,fontFamily:"monospace",fontSize:13,outline:"none",color:"#1a0a00",background:"white"}}/>
          <div style={{width:22,height:22,borderRadius:"50%",background:preview,border:"2px solid #ddd",flexShrink:0}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"7px 0",border:"1.5px solid #e8d5b0",background:"transparent",fontFamily:"inherit",fontSize:12,cursor:"pointer",borderRadius:2,color:"#888",letterSpacing:2}}>取消</button>
          <button onClick={()=>{if(!isHex(hex)){alert("請輸入有效6位色碼");return;}onApply("#"+hex);}} style={{flex:2,padding:"7px 0",border:"1.5px solid #9b1b1b",background:"#9b1b1b",color:"#f5ead5",fontFamily:"inherit",fontSize:12,cursor:"pointer",borderRadius:2,letterSpacing:2}}>套用</button>
        </div>
      </div>
    </div>
  );
}

function CatPanel({cats,stamps,onClose,onUpdate}){
  const[lc,setLc]=useState(cats.map(c=>({...c})));
  const[newName,setNewName]=useState("");
  const[picker,setPicker]=useState(null);
  const save=u=>{setLc(u);onUpdate(u);};
  const rename=(id,v)=>{if(!v.trim())return;save(lc.map(c=>c.id===id?{...c,name:v.trim()}:c));};
  const recolor=(id,color)=>{save(lc.map(c=>c.id===id?{...c,color}:c));setPicker(null);};
  const del=id=>{if(lc.length<=1){alert("至少需保留一個分類");return;}const o=lc.find(c=>c.id!==id);onUpdate(lc.filter(c=>c.id!==id),id,o.id);setLc(p=>p.filter(c=>c.id!==id));};
  const add=()=>{const n=newName.trim();if(!n)return;if(lc.find(c=>c.name===n)){alert("名稱已存在");return;}const nc={id:"cat_"+Date.now(),name:n,color:PALETTE[lc.length%PALETTE.length]};const u=[...lc,nc];save(u);onUpdate(u);setNewName("");};
  const count=id=>stamps.filter(s=>s.cat===id).length;
  return(
    <div style={{...overlayBg,zIndex:300,background:"rgba(10,5,0,.6)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{...modalBox,maxWidth:460}}>
        <button onClick={onClose} style={closeBtn}>✕</button>
        <div style={{fontSize:15,letterSpacing:4,marginBottom:4,fontFamily:"serif"}}>管理分類</div>
        <div style={{fontSize:12,color:"#999",letterSpacing:1,marginBottom:18,lineHeight:1.7}}>點擊色點更換顏色（支援色碼輸入）</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
          {lc.map(cat=>(
            <div key={cat.id} style={{display:"flex",alignItems:"center",gap:10,border:"1px solid #e8d5b0",padding:"9px 12px",borderRadius:2,background:"white"}}>
              <div onClick={()=>setPicker(cat)} style={{width:22,height:22,borderRadius:"50%",background:cat.color,flexShrink:0,cursor:"pointer",border:"2px solid rgba(0,0,0,.1)"}}/>
              <input defaultValue={cat.name} maxLength={12} onBlur={e=>rename(cat.id,e.target.value)} onKeyDown={e=>e.key==="Enter"&&e.target.blur()} style={{flex:1,border:"none",background:"transparent",fontFamily:"serif",fontSize:14,letterSpacing:2,outline:"none",color:"#1a0a00"}}/>
              <span style={{fontSize:11,color:"#bbb",whiteSpace:"nowrap"}}>{count(cat.id)} 枚</span>
              <button onClick={()=>del(cat.id)} style={{background:"none",border:"none",fontSize:15,cursor:"pointer",color:"#ddd",lineHeight:1}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} maxLength={12} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="輸入新分類名稱…" style={{flex:1,padding:"8px 12px",border:"1.5px solid #e8d5b0",background:"white",fontFamily:"serif",fontSize:13,letterSpacing:2,borderRadius:2,outline:"none",color:"#1a0a00"}}/>
          <button onClick={add} style={{padding:"8px 16px",border:"1.5px solid #9b1b1b",background:"#9b1b1b",color:"#f5ead5",fontFamily:"inherit",fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:2,whiteSpace:"nowrap"}}>＋ 新增</button>
        </div>
      </div>
      {picker&&<ColorPicker cat={picker} onClose={()=>setPicker(null)} onApply={color=>recolor(picker.id,color)}/>}
    </div>
  );
}

function StampModal({stamp,cats,onClose,onSave}){
  const[mode,setMode]=useState("view");
  const[form,setForm]=useState({...stamp});
  const fileRef=useRef(null);
  useEffect(()=>{setMode("view");setForm({...stamp});},[stamp]);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const catName=id=>(cats.find(c=>c.id===id)||{}).name||id;
  const handleImg=e=>{const file=e.target.files[0];if(!file)return;if(file.size>800*1024){alert("圖片請小於 800KB");return;}const r=new FileReader();r.onload=ev=>f("image",ev.target.result);r.readAsDataURL(file);};
  const gb={padding:"7px 20px",border:"1.5px solid #b8860b",background:"transparent",color:"#b8860b",fontFamily:"inherit",fontSize:12,cursor:"pointer",borderRadius:2,letterSpacing:2};
  return(
    <div style={overlayBg} onClick={onClose}>
      <div style={modalBox} onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} style={closeBtn}>✕</button>
        {mode==="view"?(
          <>
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><StampVisual stamp={stamp} size={160}/></div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:4,textAlign:"center",marginBottom:5,fontFamily:"serif"}}>{stamp.name}</div>
            <div style={{textAlign:"center",fontSize:11,letterSpacing:3,color:"#b8860b",textTransform:"uppercase",marginBottom:12}}>{catName(stamp.cat)}</div>
            <div style={{fontSize:13,lineHeight:2,color:"#555",textAlign:"center",marginBottom:14}}>{stamp.desc}</div>
            <div style={{display:"flex",gap:16,borderTop:"1px solid #e8d5b0",paddingTop:12,justifyContent:"center",flexWrap:"wrap"}}>
              {[["蓋印日期",stamp.stampDate?fmtDate(stamp.stampDate):"—"],["材質",stamp.material],["類型",catName(stamp.cat)]].map(([l,v])=>(<div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:"#b8860b",marginBottom:3}}>{l}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>))}
            </div>
            <div style={{display:"flex",justifyContent:"center",marginTop:14}}><button onClick={()=>setMode("edit")} style={gb}>✏ 編輯</button></div>
            <div style={{marginTop:14,borderTop:"1px solid #e8d5b0",paddingTop:12}}>
              <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#b8860b",marginBottom:8,textAlign:"center"}}>移至分類</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
                {cats.map(cat=>(<button key={cat.id} onClick={()=>{onSave({...stamp,cat:cat.id});onClose();}} style={{padding:"4px 12px",border:`1.5px solid ${stamp.cat===cat.id?"#9b1b1b":"#e8d5b0"}`,background:stamp.cat===cat.id?"#9b1b1b":"transparent",color:stamp.cat===cat.id?"white":"#1a0a00",fontFamily:"inherit",fontSize:12,cursor:"pointer",borderRadius:2,letterSpacing:1}}>{cat.name}</button>))}
              </div>
            </div>
          </>
        ):(
          <>
            <div style={{fontSize:13,letterSpacing:3,color:"#b8860b",textTransform:"uppercase",marginBottom:16,textAlign:"center"}}>編輯印章</div>
            <div style={{marginBottom:16}}>
              <span style={lbl}>印章圖片</span>
              {form.image?(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                  <img src={form.image} alt="preview" style={{width:130,height:130,objectFit:"cover",borderRadius:3,border:"1px solid #e8d5b0"}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>fileRef.current.click()} style={{...gb,fontSize:11,padding:"5px 14px"}}>更換圖片</button>
                    <button onClick={()=>f("image",null)} style={{padding:"5px 14px",border:"1.5px solid #e8d5b0",background:"transparent",color:"#aaa",fontFamily:"inherit",fontSize:11,cursor:"pointer",borderRadius:2}}>移除圖片</button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <StampVisual stamp={form} size={120}/>
                  <p style={{fontSize:11,color:"#bbb",textAlign:"center",margin:0}}>目前為自動生成圖樣</p>
                  <button onClick={()=>fileRef.current.click()} style={{padding:"7px 20px",border:"1.5px dashed #b8860b",background:"rgba(184,134,11,.05)",color:"#b8860b",fontFamily:"inherit",fontSize:12,cursor:"pointer",borderRadius:2,letterSpacing:2}}>📷 上傳自訂圖片</button>
                  <p style={{fontSize:10,color:"#ccc",margin:0}}>建議小於 800KB</p>
                </div>
              )}
              <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
            </div>
            <div style={{marginBottom:12}}><span style={lbl}>印章名稱</span><input value={form.name} onChange={e=>f("name",e.target.value)} maxLength={20} style={inp}/></div>
            <div style={{marginBottom:12}}><span style={lbl}>描述</span><textarea value={form.desc} onChange={e=>f("desc",e.target.value)} rows={3} style={{...inp,resize:"vertical",lineHeight:1.8}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:12}}>
              <div><span style={lbl}>蓋印日期</span><input type="date" value={form.stampDate||""} onChange={e=>f("stampDate",e.target.value)} style={{...inp,cursor:"pointer"}}/></div>
              <div><span style={lbl}>材質</span><input value={form.material} onChange={e=>f("material",e.target.value)} maxLength={20} style={inp}/></div>
            </div>
            <div style={{marginBottom:18}}><span style={lbl}>分類</span><select value={form.cat} onChange={e=>f("cat",e.target.value)} style={{...inp,cursor:"pointer"}}>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>{setForm({...stamp});setMode("view");}} style={{padding:"8px 18px",border:"1.5px solid #e8d5b0",background:"transparent",color:"#888",fontFamily:"inherit",fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:2}}>取消</button>
              <button onClick={()=>{onSave(form);setMode("view");}} style={{padding:"8px 26px",border:"1.5px solid #9b1b1b",background:"#9b1b1b",color:"#f5ead5",fontFamily:"inherit",fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:2}}>儲存</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function StampCard({stamp,catColor,catName,onClick,delay}){
  const col=catColor(stamp.cat);
  return(
    <div onClick={onClick} style={{background:"white",border:"1px solid #e8d5b0",borderRadius:3,padding:18,display:"flex",flexDirection:"column",alignItems:"center",gap:10,cursor:"pointer",boxShadow:"2px 3px 12px rgba(26,10,0,.12)",position:"relative",transition:"all .3s",animation:`cardIn .4s ease ${delay}ms both`}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.borderColor="#b8860b";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor="#e8d5b0";}}>
      <span style={{position:"absolute",top:7,right:7,fontSize:9,letterSpacing:2,padding:"2px 7px",borderRadius:1,fontWeight:600,background:col+"22",color:col}}>{catName(stamp.cat)}</span>
      <StampVisual stamp={stamp} size={120}/>
      <div style={{fontSize:13,fontWeight:600,letterSpacing:2,textAlign:"center",fontFamily:"serif"}}>{stamp.name}</div>
      <div style={{fontSize:11,color:"#999",letterSpacing:1,textAlign:"center"}}>{stamp.stampDate?fmtDate(stamp.stampDate):"—"}・{stamp.material}</div>
      <div style={{fontSize:10,letterSpacing:2,color:"#b8860b",fontStyle:"italic"}}>{catName(stamp.cat)}</div>
    </div>
  );
}

function App(){
  const[cats,setCats]=useState(INIT_CATS);
  const[stamps,setStamps]=useState(INIT_STAMPS);
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[selected,setSelected]=useState(null);
  const[showCatPanel,setShowCatPanel]=useState(false);
  const[fbStatus,setFbStatus]=useState("idle");
  const toast=useToast();
  const unsubRef=useRef(null);

  const catName=id=>(cats.find(c=>c.id===id)||{}).name||id;
  const catColor=id=>(cats.find(c=>c.id===id)||{}).color||"#888";

  useEffect(()=>{
    let cancelled=false;
    setFbStatus("loading");
    (async()=>{
      try{
        const{db,collection,onSnapshot,query,orderBy,getDocs,doc,setDoc}=await getFB();
        const q=query(collection(db,"stamps"),orderBy("_order","asc"));
        unsubRef.current=onSnapshot(q,snap=>{
          if(cancelled)return;
          if(snap.empty){
            (async()=>{
              for(let i=0;i<INIT_STAMPS.length;i++) await setDoc(doc(collection(db,"stamps"),INIT_STAMPS[i].id),{...INIT_STAMPS[i],_order:i});
              for(const c of INIT_CATS) await setDoc(doc(collection(db,"cats"),c.id),c);
            })();
          } else {
            setStamps(snap.docs.map(d=>({...d.data()})));
          }
        },()=>{if(!cancelled){setFbStatus("error");toast.fire("Firebase 連線失敗");}});
        const cSnap=await getDocs(collection(db,"cats"));
        if(!cSnap.empty&&!cancelled) setCats(cSnap.docs.map(d=>d.data()));
        if(!cancelled) setFbStatus("ok");
      }catch(e){if(!cancelled){setFbStatus("error");toast.fire("Firebase 連線失敗");}}
    })();
    return()=>{cancelled=true;unsubRef.current&&unsubRef.current();};
  },[]);

  async function saveStamp(updated){
    setStamps(p=>p.map(s=>s.id===updated.id?updated:s));
    setSelected(updated);
    toast.fire(`「${updated.name}」已儲存`);
    try{const{db,collection,doc,setDoc}=await getFB();const idx=stamps.findIndex(s=>s.id===updated.id);await setDoc(doc(collection(db,"stamps"),updated.id),{...updated,_order:idx>=0?idx:999});}catch(e){toast.fire("儲存失敗");}
  }

  async function handleCatUpdate(updated,deletedId,replaceId){
    setCats(updated);
    if(deletedId){setStamps(p=>p.map(s=>s.cat===deletedId?{...s,cat:replaceId}:s));if(filter===deletedId)setFilter("all");toast.fire("分類已刪除");}
    try{
      const{db,collection,doc,setDoc,deleteDoc,getDocs}=await getFB();
      for(const c of updated) await setDoc(doc(collection(db,"cats"),c.id),c);
      if(deletedId){await deleteDoc(doc(collection(db,"cats"),deletedId));const snap=await getDocs(collection(db,"stamps"));for(const d of snap.docs){if(d.data().cat===deletedId) await setDoc(d.ref,{...d.data(),cat:replaceId});}}
    }catch(e){toast.fire("分類同步失敗");}
  }

  const filtered=stamps.filter(s=>{const cm=filter==="all"||s.cat===filter;const q=search.toLowerCase();const tm=!q||s.name.includes(q)||s.desc.includes(q)||catName(s.cat).includes(q);return cm&&tm;});
  const statusInfo={idle:{c:"#bbb",l:""},loading:{c:"#b8860b",l:"同步中…"},ok:{c:"#2d6a2d",l:"已連線 Firebase ☁"},error:{c:"#c0392b",l:"離線模式"}}[fbStatus];

  return(
    <div style={{minHeight:"100vh",background:"#fdf6e3",fontFamily:"'Noto Serif TC',serif",color:"#1a0a00",backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,150,80,.07) 39px,rgba(180,150,80,.07) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,150,80,.04) 39px,rgba(180,150,80,.04) 40px)"}}>
      <header style={{background:"#1a0a00",padding:"30px 24px 26px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.02) 8px,rgba(255,255,255,.02) 16px)"}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"linear-gradient(90deg,transparent,#b8860b,#c0392b,#b8860b,transparent)"}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontFamily:"Georgia,serif",fontStyle:"italic",color:"#e6c87a",fontSize:12,letterSpacing:4,marginBottom:8,opacity:.8}}>Seal &amp; Stamp Archive</div>
          <h1 style={{fontSize:"clamp(24px,5vw,50px)",color:"#f5ead5",fontWeight:700,letterSpacing:8,lineHeight:1,margin:0}}>印　章　典　藏</h1>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginTop:12}}>
            <div style={{height:1,width:60,background:"linear-gradient(90deg,transparent,#b8860b)"}}/>
            <div style={{width:5,height:5,background:"#c0392b",transform:"rotate(45deg)"}}/>
            <div style={{height:1,width:60,background:"linear-gradient(90deg,#b8860b,transparent)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginTop:16,flexWrap:"wrap"}}>
            <button onClick={()=>setShowCatPanel(true)} style={{padding:"6px 20px",border:"1px solid rgba(230,200,122,.35)",background:"rgba(184,134,11,.1)",color:"#e6c87a",fontFamily:"inherit",fontSize:11,cursor:"pointer",borderRadius:2,letterSpacing:3}}>⚙ 管理分類</button>
            {statusInfo.l&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,letterSpacing:2,color:statusInfo.c}}><div style={{width:6,height:6,borderRadius:"50%",background:statusInfo.c}}/>{statusInfo.l}</div>}
          </div>
        </div>
      </header>
      <div style={{padding:"11px 24px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",borderBottom:"1px solid #e8d5b0",background:"rgba(245,234,213,.96)",position:"sticky",top:0,zIndex:100}}>
        <span style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#b8860b",fontWeight:600,marginRight:2}}>分類</span>
        {[{id:"all",name:"全部",color:null},...cats].map(c=>(<button key={c.id} onClick={()=>setFilter(c.id)} style={{padding:"5px 13px",border:`1.5px solid ${filter===c.id?"#9b1b1b":"#e8d5b0"}`,background:filter===c.id?"#9b1b1b":"transparent",color:filter===c.id?"#f5ead5":"#1a0a00",fontFamily:"inherit",fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:1,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>{c.color&&<span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block"}}/>}{c.name}</button>))}
        <div style={{marginLeft:"auto",position:"relative"}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:11,pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋印章…" style={{padding:"6px 12px 6px 30px",border:"1.5px solid #e8d5b0",background:"white",fontFamily:"inherit",fontSize:13,color:"#1a0a00",borderRadius:2,outline:"none",width:160}}/>
        </div>
      </div>
      <div style={{padding:24,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:20}}>
        {fbStatus==="loading"&&stamps.length===0
          ?<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#b8860b",fontSize:13,letterSpacing:3}}>正在從 Firebase 載入資料…</div>
          :filtered.length===0
            ?<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#ccc",fontSize:14,letterSpacing:2}}>沒有符合條件的印章</div>
            :filtered.map((s,i)=>(<StampCard key={s.id} stamp={s} catColor={catColor} catName={catName} onClick={()=>setSelected(s)} delay={i*35}/>))
        }
      </div>
      {selected&&<StampModal stamp={selected} cats={cats} onClose={()=>setSelected(null)} onSave={saveStamp}/>}
      {showCatPanel&&<CatPanel cats={cats} stamps={stamps} onClose={()=>setShowCatPanel(false)} onUpdate={handleCatUpdate}/>}
      <div style={{position:"fixed",bottom:24,left:"50%",transform:`translateX(-50%) translateY(${toast.show?0:16}px)`,background:"#1a0a00",color:"#e6c87a",padding:"9px 22px",borderRadius:2,fontSize:13,letterSpacing:2,opacity:toast.show?1:0,transition:"all .3s",pointerEvents:"none",zIndex:999,whiteSpace:"nowrap"}}>{toast.msg}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
