function StampVisual({stamp,size=120}){
  try {
    const imgs=stamp.images||[];
    const cover=imgs[stamp.coverIdx||0]||imgs[0]||stamp.image||null;
    if(cover)return(<div style={{maxWidth:size*1.5,width:"100%",borderRadius:3,overflow:"hidden",border:"1px solid #e8d5b0",flexShrink:0}}><img src={cover} alt={stamp.name} style={{width:"100%",height:"auto",display:"block"}}/></div>);
    if(!stamp.svgKey)return <div style={{width:size,height:size,background:"#f5ead5",borderRadius:3,border:"1px solid #e8d5b0",flexShrink:0}}/>;
    return <div style={{width:size,height:size,flexShrink:0}} dangerouslySetInnerHTML={{__html:renderSvg(stamp.svgKey,stamp.svgArgs||[])}}/>;
  } catch(e) {
    return <div style={{width:size,height:size,background:"#f5ead5",borderRadius:3,border:"1px solid #e8d5b0",flexShrink:0}}/>;
  }
}

function ColorPicker({cat,onClose,onApply}){

        </div>
      </div>
    </div>
  );
}

/* ── CatPanel ── */
function CatPanel({cats,stamps,onClose,onUpdate,font,dark=false}){
  const[localCats,setLocalCats]=useState(cats.map(c=>({...c})));
  const[currentParent,setCurrentParent]=useState(null); // null=頂層
  const[newName,setNewName]=useState("");
  const[picker,setPicker]=useState(null);

  const save=updated=>{setLocalCats(updated);onUpdate(updated);};
  const currentCats=localCats.filter(c=>(currentParent===null?!c.parentId:c.parentId===currentParent));
  const currentPath=currentParent?getCatPath(localCats,currentParent):[];
  const count=id=>{
    const descIds=[id,...getAllDescendantIds(localCats,id)];
    return stamps.filter(s=>descIds.includes(s.cat)).length;
  };
  const rename=(id,v)=>{if(!v.trim())return;save(localCats.map(c=>c.id===id?{...c,name:v.trim()}:c));};
  const recolor=(id,color)=>{save(localCats.map(c=>c.id===id?{...c,color}:c));setPicker(null);};
  const del=id=>{
    const descIds=getAllDescendantIds(localCats,id);
    const allDel=[id,...descIds];
    const siblings=localCats.filter(c=>c.parentId===(getCatById(localCats,id)?.parentId||null)&&c.id!==id);
    const fallback=siblings[0]||localCats.find(c=>!allDel.includes(c.id));
    if(!fallback){alert("至少需保留一個分類");return;}
    const updated=localCats.filter(c=>!allDel.includes(c.id));
    onUpdate(updated,allDel,fallback.id);
    setLocalCats(updated);
  };
  const add=()=>{
    const n=newName.trim();if(!n)return;
    if(localCats.find(c=>c.name===n&&c.parentId===currentParent)){alert("同層已有相同名稱");return;}
    const parent=currentParent?getCatById(localCats,currentParent):null;
    const color=parent?parent.color:PALETTE[localCats.filter(c=>!c.parentId).length%PALETTE.length];
    const nc={id:"cat_"+Date.now(),name:n,color,parentId:currentParent};
    const updated=[...localCats,nc];save(updated);onUpdate(updated);setNewName("");
  };

  return(
    <div style={{...overlayBg,zIndex:300,background:"rgba(10,5,0,.6)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{...darkBox(dark),maxWidth:460,fontFamily:font}}>
        <button onClick={onClose} style={closeBtn}>✕</button>
        <div style={{fontSize:15,letterSpacing:4,marginBottom:4}}>管理分類</div>

        {/* 麵包屑路徑 */}
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:14,fontSize:12}}>
          <span onClick={()=>setCurrentParent(null)} style={{color:currentParent?"#b8860b":"#1a0a00",cursor:currentParent?"pointer":"default",letterSpacing:2}}>頂層</span>
          {currentPath.map((c,i)=>(
            <span key={c.id} style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:"#ccc"}}>›</span>
              <span onClick={()=>setCurrentParent(i===currentPath.length-1?c.id:c.id)} style={{color:i===currentPath.length-1?"#1a0a00":"#b8860b",cursor:"pointer",letterSpacing:2}}>{c.name}</span>
            </span>
          ))}
        </div>

        {/* 返回上層 */}
        {currentParent&&(
          <button onClick={()=>{const p=getCatById(localCats,currentParent);setCurrentParent(p?.parentId||null);}} style={{marginBottom:12,padding:"4px 12px",border:"1px solid #e8d5b0",background:"transparent",fontFamily:font,fontSize:12,cursor:"pointer",borderRadius:2,color:"#888",letterSpacing:2}}>← 返回上層</button>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
          {currentCats.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#ccc",fontSize:12,letterSpacing:2}}>尚無分類，請在下方新增</div>}
          {currentCats.map(cat=>{
            const hasChildren=getChildren(localCats,cat.id).length>0;
            return(
              <div key={cat.id} style={darkRow(dark)}>
                <div onClick={()=>setPicker(cat)} style={{width:22,height:22,borderRadius:"50%",background:cat.color,flexShrink:0,cursor:"pointer",border:"2px solid rgba(0,0,0,.1)"}}/>
                <input defaultValue={cat.name} maxLength={12}
                  onBlur={e=>rename(cat.id,e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&e.target.blur()}
                  style={{flex:1,border:"none",background:"transparent",fontFamily:font,fontSize:14,letterSpacing:2,outline:"none",color:dark?"#e8d5b0":"#1a0a00"}}/>
                <span style={{fontSize:11,color:dark?"#666":"#bbb",whiteSpace:"nowrap"}}>{count(cat.id)} 枚</span>
                {/* 進入子分類 */}
                <button onClick={()=>{setCurrentParent(cat.id);setNewName("");}} title="管理子分類"
                  style={{background:"none",border:"1px solid #e8d5b0",borderRadius:2,fontSize:11,cursor:"pointer",color:"#b8860b",padding:"2px 8px",whiteSpace:"nowrap",letterSpacing:1}}>
                  子分類 {hasChildren?`(${getChildren(localCats,cat.id).length})`:""}›
                </button>
                <button onClick={()=>del(cat.id)} style={{background:"none",border:"none",fontSize:15,cursor:"pointer",color:"#ddd",lineHeight:1}}
                  onMouseEnter={e=>e.target.style.color="#c0392b"}
                  onMouseLeave={e=>e.target.style.color="#ddd"}>✕</button>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:10}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} maxLength={12}
            onKeyDown={e=>e.key==="Enter"&&add()} placeholder={currentParent?`在「${getCatById(localCats,currentParent)?.name}」下新增子分類…`:"輸入新分類名稱…"}
            style={{flex:1,padding:"8px 12px",border:`1.5px solid ${dark?"#3a2e1e":"#e8d5b0"}`,background:dark?"#2a2218":"white",fontFamily:font,fontSize:13,letterSpacing:2,borderRadius:2,outline:"none",color:dark?"#e8d5b0":"#1a0a00"}}/>
          <button onClick={add} style={{padding:"8px 16px",border:"1.5px solid #9b1b1b",background:"#9b1b1b",color:"#f5ead5",fontFamily:font,fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:2,whiteSpace:"nowrap"}}>＋ 新增</button>
        </div>
      </div>
      {picker&&<ColorPicker cat={picker} onClose={()=>setPicker(null)} onApply={color=>recolor(picker.id,color)}/>}
    </div>
  );
}

/* ── StampForm (新增/編輯共用) ── */

/* ── CalendarModal ── */
function CalendarModal({stamps,onClose,onSelectStamp,font,fontSize,dark=false}){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth());
  const[daySelected,setDaySelected]=useState(null);

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const weeks=[];
  let day=1-firstDay;
  for(let w=0;w<6;w++){
    const row=[];
    for(let d=0;d<7;d++,day++) row.push(day);
    weeks.push(row);
    if(day>daysInMonth) break;
  }

  const padZ=n=>String(n).padStart(2,'0');
  const dateStr=(y,m,d)=>`${y}-${padZ(m+1)}-${padZ(d)}`;
  const stampsOnDay=d=>stamps.filter(s=>s.stampDate===dateStr(year,month,d));
  const todayStr=new Date().toISOString().slice(0,10);

  const dayStamps=daySelected?stampsOnDay(daySelected):[];
  const WEEK=['日','一','二','三','四','五','六'];
  const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(10,5,0,.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{...darkBox(dark),maxWidth:480,fontFamily:font}}>
        <button onClick={onClose} style={{position:"absolute",top:10,right:14,background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#b8860b",lineHeight:1}}>✕</button>

        {/* 月份導航 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);setDaySelected(null);}} style={{background:"none",border:"1.5px solid #e8d5b0",borderRadius:2,padding:"4px 12px",cursor:"pointer",color:"#b8860b",fontSize:16}}>‹</button>
          <div style={{textAlign:"center"}}>
            <select value={year} onChange={e=>{setYear(Number(e.target.value));setDaySelected(null);}}
              style={{fontSize:18,fontWeight:700,letterSpacing:2,background:"transparent",border:"none",color:dark?"#e8d5b0":"#1a0a00",fontFamily:"inherit",cursor:"pointer",textAlign:"center",marginBottom:4,outline:"none"}}>
              {Array.from({length:21},(_,i)=>now.getFullYear()-10+i).map(y=>(<option key={y} value={y}>{y}</option>))}
            </select>
            <div style={{fontSize:13,color:"#b8860b",letterSpacing:3}}>{MONTHS[month]}</div>
          </div>
          <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);setDaySelected(null);}} style={{background:"none",border:"1.5px solid #e8d5b0",borderRadius:2,padding:"4px 12px",cursor:"pointer",color:"#b8860b",fontSize:16}}>›</button>
        </div>
        {/* 月份快選 */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center",marginBottom:14}}>
          {MONTHS.map((m,i)=>(
            <button key={i} onClick={()=>{setMonth(i);setDaySelected(null);}}
              style={{padding:"3px 8px",border:`1px solid ${month===i?"#9b1b1b":"#e8d5b0"}`,background:month===i?"#9b1b1b":"transparent",color:month===i?"white":"#888",fontFamily:"inherit",fontSize:11,cursor:"pointer",borderRadius:2,letterSpacing:1}}>
              {m.replace('月','')}月
            </button>
          ))}
        </div>

        {/* 星期標題 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {WEEK.map(w=>(<div key={w} style={{textAlign:"center",fontSize:10,letterSpacing:2,color:"#aaa",padding:"4px 0"}}>{w}</div>))}
        </div>

        {/* 日期格 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:20}}>
          {weeks.flat().map((d,i)=>{
            const valid=d>=1&&d<=daysInMonth;
            const ds=valid?dateStr(year,month,d):"";
            const cnt=valid?stampsOnDay(d).length:0;
            const isToday=ds===todayStr;
            const isSel=d===daySelected;
            return(
              <div key={i} onClick={()=>{if(valid&&cnt>0){setDaySelected(d===daySelected?null:d);}}} style={{
                minHeight:44,borderRadius:3,padding:"4px 2px",textAlign:"center",
                background:isSel?"#9b1b1b":isToday?"rgba(184,134,11,.12)":dark?"#2a2218":"transparent",
                border:isSel?"1.5px solid #9b1b1b":isToday?"1.5px solid #b8860b":"1.5px solid transparent",
                cursor:valid&&cnt>0?"pointer":"default",
                opacity:valid?1:0,transition:"all .15s"
              }}>
                {valid&&(<>
                  <div style={{fontSize:13,fontWeight:isToday?700:400,color:isSel?"white":isToday?"#b8860b":dark?"#e8d5b0":"#1a0a00"}}>{d}</div>
                  {cnt>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center",marginTop:2}}>
                      {Array.from({length:Math.min(cnt,4)}).map((_,i)=>(<div key={i} style={{width:5,height:5,borderRadius:"50%",background:isSel?"rgba(255,255,255,.7)":"#c0392b"}}/>))}
                      {cnt>4&&<div style={{fontSize:8,color:isSel?"white":"#c0392b"}}>+{cnt-4}</div>}
                    </div>
                  )}
                </>)}
              </div>
            );
          })}
        </div>

        {/* 當日印章列表 */}
        {daySelected&&(
          <div style={{borderTop:"1px solid #e8d5b0",paddingTop:16}}>
            <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#b8860b",marginBottom:12,textAlign:"center"}}>
              {year}/{padZ(month+1)}/{padZ(daySelected)} 蓋章紀錄（{dayStamps.length} 枚）
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {dayStamps.map(s=>(
                <div key={s.id} onClick={()=>{onSelectStamp(s);onClose();}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",border:`1px solid ${dark?"#3a2e1e":"#e8d5b0"}`,borderRadius:2,background:dark?"#2a2218":"white",cursor:"pointer",transition:"all .2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="#b8860b"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="#e8d5b0"}>
                  <div style={{width:48,height:48,flexShrink:0}}>
                    {(()=>{const imgs=s.images||[];const cover=imgs[s.coverIdx||0]||imgs[0]||s.image||null;return cover?<img src={cover} style={{width:48,height:48,objectFit:"cover",borderRadius:2}}/>:<div style={{width:48,height:48}} dangerouslySetInnerHTML={{__html:renderSvg(s.svgKey,s.svgArgs)}}/>;})()}
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,letterSpacing:2,color:dark?"#e8d5b0":"#1a0a00"}}>{s.name}</div>
                    <div style={{fontSize:11,color:"#999",letterSpacing:1,marginTop:2}}>{s.material}</div>
                  </div>
                  <div style={{marginLeft:"auto",fontSize:11,color:"#b8860b",letterSpacing:1}}>›</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {!daySelected&&(
          <div style={{textAlign:"center",fontSize:12,color:dark?"#555":"#ccc",letterSpacing:2,paddingTop:4}}>點選有紀錄的日期查看蓋章</div>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const[cats,setCats]=useState(INIT_CATS);
  const[stamps,setStamps]=useState(INIT_STAMPS);
  const[filter,setFilter]=useState("all");
  const[catPath,setCatPath]=useState([]); // 當前瀏覽的分類路徑
  const[search,setSearch]=useState("");
  const[selected,setSelected]=useState(null);
  const[showCatPanel,setShowCatPanel]=useState(false);
  const[showAddForm,setShowAddForm]=useState(false);
  const[showFontPicker,setShowFontPicker]=useState(false);
  const[showCalendar,setShowCalendar]=useState(false);
  const[dark,setDark]=useState(false);
  useEffect(()=>{document.body.classList.toggle("dark",dark);},[dark]);
  const[fontSize,setFontSize]=useState(14);
  const[font,setFont]=useState("'CreamFont',serif");
  const[fbStatus,setFbStatus]=useState("idle");
  const toast=useToast();
  const unsubRef=useRef(null);
  const stampsRef=useRef(stamps);
  useEffect(()=>{stampsRef.current=stamps;},[stamps]);
  useEffect(()=>{document.body.style.fontSize=fontSize+"px";},[fontSize]);

  const catName=id=>{const c=cats.find(x=>x.id===id);return c?c.name:id;};
  const catFullPath=id=>{const path=getCatPath(cats,id);return path.map(c=>c.name).join(" › ");};
  const catColor=id=>(cats.find(c=>c.id===id)||{}).color||"#888";

  useEffect(()=>{
    let cancelled=false;setFbStatus("loading");
    (async()=>{
      try{
        const{db,collection,onSnapshot,query,orderBy,getDocs,doc,setDoc}=await getFB();
        const q=query(collection(db,"stamps"),orderBy("_order","asc"));
        unsubRef.current=onSnapshot(q,snap=>{
          if(cancelled)return;
          if(snap.empty){
            (async()=>{for(let i=0;i<INIT_STAMPS.length;i++) await setDoc(doc(collection(db,"stamps"),INIT_STAMPS[i].id),{...INIT_STAMPS[i],_order:i});for(const c of INIT_CATS) await setDoc(doc(collection(db,"cats"),c.id),{parentId:null,...c});})();
          } else setStamps(snap.docs.map(d=>({...d.data()})));
        },()=>{if(!cancelled){setFbStatus("error");toast.fire("Firebase 連線失敗");}});
        const cSnap=await getDocs(collection(db,"cats"));
        if(!cSnap.empty&&!cancelled) setCats(cSnap.docs.map(d=>({parentId:null,...d.data()})));
        if(!cancelled) setFbStatus("ok");
      }catch(e){if(!cancelled){setFbStatus("error");toast.fire("Firebase 連線失敗");}}
    })();
    return()=>{cancelled=true;unsubRef.current&&unsubRef.current();};
  },[]);

  async function saveStamp(updated){
    const cur=stampsRef.current;
    const idx=cur.findIndex(s=>s.id===updated.id);
    const isNew=idx<0;
    const newList=isNew?[...cur,updated]:cur.map(s=>s.id===updated.id?updated:s);
    setStamps(newList);
    if(selected&&selected.id===updated.id) setSelected(updated);
    toast.fire(isNew?`「${updated.name}」已新增`:`「${updated.name}」已更新`);
    try{const{db,collection,doc,setDoc}=await getFB();await setDoc(doc(collection(db,"stamps"),updated.id),{...updated,_order:isNew?newList.length-1:idx});}catch(e){toast.fire("儲存失敗");}
  }

  async function deleteStamp(id){
    setStamps(p=>p.filter(s=>s.id!==id));
    toast.fire("印章已刪除");
    try{const{db,collection,doc,deleteDoc}=await getFB();await deleteDoc(doc(collection(db,"stamps"),id));}catch(e){toast.fire("刪除失敗");}
  }

  async function handleCatUpdate(updated,deletedIds,replaceId){
    setCats(updated);
    if(deletedIds&&deletedIds.length>0){
      setStamps(p=>p.map(s=>deletedIds.includes(s.cat)?{...s,cat:replaceId}:s));
      if(deletedIds.includes(filter))setFilter("all");
      if(deletedIds.includes(catPath[catPath.length-1]))setCatPath([]);
      toast.fire("分類已刪除");
    }
    try{
      const{db,collection,doc,setDoc,deleteDoc,getDocs}=await getFB();
      for(const c of updated) await setDoc(doc(collection(db,"cats"),c.id),c);
      if(deletedIds&&deletedIds.length>0){
        for(const did of deletedIds) await deleteDoc(doc(collection(db,"cats"),did));
        const snap=await getDocs(collection(db,"stamps"));
        for(const d of snap.docs){if(deletedIds.includes(d.data().cat)) await setDoc(d.ref,{...d.data(),cat:replaceId});}
      }
    }catch(e){toast.fire("分類同步失敗");}
  }

  const filteredCatIds=filter==="all"
    ?cats.map(c=>c.id)
    :[filter,...getAllDescendantIds(cats,filter)];
  const filtered=stamps.filter(s=>{
    const cm=filter==="all"?true:filteredCatIds.includes(s.cat);
    const q=search.toLowerCase();
    const tm=!q||s.name.includes(q)||s.desc.includes(q)||catName(s.cat).includes(q);
    return cm&&tm;
  });
  const si={idle:{c:"#bbb",l:""},loading:{c:"#b8860b",l:"同步中…"},ok:{c:"#2d6a2d",l:"已連線 Firebase ☁"},error:{c:"#c0392b",l:"離線模式"}}[fbStatus];

  const newStampDefault=()=>({id:"s_"+Date.now(),name:"新印章",cat:filter!=="all"?filter:(cats[0]?.id||"official"),desc:"",stampDate:today,stampType:"單色章",location:"",bookVol:"",bookPage:"",svgKey:"circle",svgArgs:["新","印","#8B0000"],images:[],coverIdx:0});

  return(
    <div style={{minHeight:"100vh",background:"#fdf6e3",fontFamily:font,color:"#1a0a00",backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,150,80,.07) 39px,rgba(180,150,80,.07) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,150,80,.04) 39px,rgba(180,150,80,.04) 40px)",background:dark?"#1a1612":"#fdf6e3",color:dark?"#e8d5b0":"#1a0a00"}}>

      {/* HEADER */}
      <header style={{background:"#1a0a00",padding:"30px 24px 26px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.02) 8px,rgba(255,255,255,.02) 16px)"}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"linear-gradient(90deg,transparent,#b8860b,#c0392b,#b8860b,transparent)"}}/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{fontFamily:"Georgia,serif",fontStyle:"italic",color:"#e6c87a",fontSize:12,letterSpacing:4,marginBottom:8,opacity:.8}}>Seal &amp; Stamp Archive</div>
          <h1 style={{fontSize:"clamp(24px,5vw,50px)",color:"#f5ead5",fontWeight:700,letterSpacing:8,lineHeight:1,margin:0,fontFamily:font}}>印　章　典　藏</h1>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginTop:12}}>
            <div style={{height:1,width:60,background:"linear-gradient(90deg,transparent,#b8860b)"}}/>
            <div style={{width:5,height:5,background:"#c0392b",transform:"rotate(45deg)"}}/>
            <div style={{height:1,width:60,background:"linear-gradient(90deg,#b8860b,transparent)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:16,flexWrap:"wrap"}}>
            {[
              {label:"⚙ 管理分類",fn:()=>setShowCatPanel(true)},
              {label:"＋ 新增印章",fn:()=>setShowAddForm(true)},
              {label:"📅 蓋章日曆",fn:()=>setShowCalendar(true)},
              {label:"Ａ 字體",fn:()=>setShowFontPicker(p=>!p)},
            ].map(b=>(
              <button key={b.label} onClick={b.fn} style={{padding:"6px 16px",border:"1px solid rgba(230,200,122,.35)",background:"rgba(184,134,11,.1)",color:"#e6c87a",fontFamily:font,fontSize:11,cursor:"pointer",borderRadius:2,letterSpacing:2,transition:"all .2s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(184,134,11,.25)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(184,134,11,.1)"}>
                {b.label}
              </button>
            ))}
            {si.l&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,letterSpacing:2,color:si.c}}><div style={{width:6,height:6,borderRadius:"50%",background:si.c}}/>{si.l}</div>}
            <button onClick={()=>setDark(d=>!d)} style={{padding:"6px 12px",border:"1px solid rgba(230,200,122,.35)",background:"rgba(184,134,11,.1)",color:"#e6c87a",fontSize:15,cursor:"pointer",borderRadius:2,lineHeight:1,fontFamily:font}}>{dark?"☀️":"🌙"}</button>
          </div>
          {/* 字體選擇下拉 */}
          {showFontPicker&&(
            <div style={{marginTop:12,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
                {FONTS.map(ff=>(
                  <button key={ff.value} onClick={()=>{setFont(ff.value);toast.fire(`字體：${ff.label}`);}}
                    style={{padding:"5px 14px",border:`1px solid ${font===ff.value?"#e6c87a":"rgba(230,200,122,.3)"}`,background:font===ff.value?"rgba(184,134,11,.3)":"transparent",color:"#e6c87a",fontFamily:ff.value,fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:1}}>
                    {ff.label}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:10,letterSpacing:2,color:"rgba(230,200,122,.7)"}}>字級</span>
                {[12,13,14,15,16,18,20].map(sz=>(
                  <button key={sz} onClick={()=>{setFontSize(sz);toast.fire(`字級：${sz}px`);}}
                    style={{padding:"3px 10px",border:`1px solid ${fontSize===sz?"#e6c87a":"rgba(230,200,122,.3)"}`,background:fontSize===sz?"rgba(184,134,11,.3)":"transparent",color:"#e6c87a",fontFamily:"inherit",fontSize:11,cursor:"pointer",borderRadius:2}}>
                    {sz}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </header>

      {/* FILTER BAR */}
      <div style={{borderBottom:`1px solid ${dark?"#3a2e1e":"#e8d5b0"}`,background:dark?"rgba(26,22,14,.97)":"rgba(245,234,213,.96)",position:"sticky",top:0,zIndex:100}}>
        {/* 麵包屑 */}
        {catPath.length>0&&(
          <div style={{padding:"6px 24px 0",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",fontSize:11}}>
            <span onClick={()=>{setCatPath([]);setFilter("all");}} style={{color:"#b8860b",cursor:"pointer",letterSpacing:2}}>全部</span>
            {catPath.map((cid,i)=>{
              const c=cats.find(x=>x.id===cid);if(!c)return null;
              return(<span key={cid} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#ccc"}}>›</span>
                <span onClick={()=>{setCatPath(catPath.slice(0,i+1));setFilter(cid);}} style={{color:i===catPath.length-1?dark?"#e8d5b0":"#1a0a00":"#b8860b",cursor:"pointer",letterSpacing:2}}>{c.name}</span>
              </span>);
            })}
          </div>
        )}
        <div style={{padding:"10px 24px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#b8860b",fontWeight:600,marginRight:2}}>
            {catPath.length===0?"分類":cats.find(c=>c.id===catPath[catPath.length-1])?.name||"分類"}
          </span>
          {/* 返回上層按鈕 */}
          {catPath.length>0&&(
            <button onClick={()=>{const np=catPath.slice(0,-1);setCatPath(np);setFilter(np.length>0?np[np.length-1]:"all");}}
              style={{padding:"4px 10px",border:"1.5px solid #e8d5b0",background:"transparent",fontFamily:font,fontSize:11,cursor:"pointer",borderRadius:2,color:"#888",letterSpacing:1}}>← 返回</button>
          )}
          {/* 全部按鈕 */}
          <button onClick={()=>setFilter(catPath.length>0?catPath[catPath.length-1]:"all")}
            style={{padding:"5px 13px",border:`1.5px solid ${filter===(catPath.length>0?catPath[catPath.length-1]:"all")?"#9b1b1b":"#e8d5b0"}`,background:filter===(catPath.length>0?catPath[catPath.length-1]:"all")?"#9b1b1b":"transparent",color:filter===(catPath.length>0?catPath[catPath.length-1]:"all")?"#f5ead5":dark?"#e8d5b0":"#1a0a00",fontFamily:font,fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:1,whiteSpace:"nowrap"}}>全部</button>
          {/* 當前層分類 */}
          {(catPath.length===0?getRootCats(cats):getChildren(cats,catPath[catPath.length-1])).map(c=>{
            const hasChildren=getChildren(cats,c.id).length>0;
            return(
              <button key={c.id}
                onClick={()=>{
                  if(hasChildren){setCatPath([...catPath,c.id]);setFilter(c.id);}
                  else setFilter(c.id);
                }}
                style={{padding:"5px 13px",border:`1.5px solid ${filter===c.id?"#9b1b1b":"#e8d5b0"}`,background:filter===c.id?"#9b1b1b":"transparent",color:filter===c.id?"#f5ead5":dark?"#e8d5b0":"#1a0a00",fontFamily:font,fontSize:13,cursor:"pointer",borderRadius:2,letterSpacing:1,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                {c.color&&<span style={{width:7,height:7,borderRadius:"50%",background:c.color,display:"inline-block"}}/>}
                {c.name}{hasChildren?" ›":""}
              </button>
            );
          })}
          <div style={{marginLeft:"auto",position:"relative"}}>
            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:11,pointerEvents:"none"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋印章…" style={{padding:"6px 12px 6px 30px",border:`1.5px solid ${dark?"#3a2e1e":"#e8d5b0"}`,background:dark?"#2a2218":"white",fontFamily:font,fontSize:13,color:dark?"#e8d5b0":"#1a0a00",borderRadius:2,outline:"none",width:150}}/>
          </div>
        </div>
      </div>

      {/* GALLERY */}
      <div style={{padding:24,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:20}}>
        {fbStatus==="loading"&&stamps.length===0
          ?<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#b8860b",fontSize:13,letterSpacing:3}}>正在從 Firebase 載入資料…</div>
          :filtered.length===0
            ?<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#ccc",fontSize:14,letterSpacing:2}}>沒有符合條件的印章</div>
            :filtered.map((s,i)=>(<StampCard key={s.id} stamp={s} catColor={catColor} catName={catName} onClick={()=>setSelected(s)} delay={i*35} font={font} fontSize={fontSize} dark={dark}/>))
        }
      </div>

      {/* MODALS */}
      {selected&&<StampModal stamp={selected} cats={cats} onClose={()=>setSelected(null)} onSave={saveStamp} onDelete={deleteStamp} font={font} fontSize={fontSize} dark={dark}/>}
      {showCatPanel&&<CatPanel cats={cats} stamps={stamps} onClose={()=>setShowCatPanel(false)} onUpdate={handleCatUpdate} font={font} dark={dark}/>}
      {showAddForm&&<StampForm initial={newStampDefault()} cats={cats} onClose={()=>setShowAddForm(false)} font={font} title="新增印章" dark={dark} onSave={form=>{saveStamp(form);setShowAddForm(false);}}/>}
      {showCalendar&&<CalendarModal stamps={stamps} onClose={()=>setShowCalendar(false)} onSelectStamp={s=>{setSelected(s);}} font={font} fontSize={fontSize} dark={dark}/>}

      <div style={{position:"fixed",bottom:24,left:"50%",transform:`translateX(-50%) translateY(${toast.show?0:16}px)`,background:"#1a0a00",color:"#e6c87a",padding:"9px 22px",borderRadius:2,fontSize:13,letterSpacing:2,opacity:toast.show?1:0,transition:"all .3s",pointerEvents:"none",zIndex:999,whiteSpace:"nowrap"}}>{toast.msg}</div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
